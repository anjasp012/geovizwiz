name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Required for Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: viz/package-lock.json

      - name: Install app deps (viz/)
        working-directory: viz
        run: npm ci

      - name: Build app (viz/)
        working-directory: viz
        run: npm run build

      - name: Stage site/ for Pages
        run: |
          mkdir -p site/viz
          cp -r viz/dist/* site/viz/
          mkdir -p site/util
          cp -r util/* site/util/
          # Optional: ensure CNAME here so the custom domain is baked into the artifact
          echo "www.putitonamap.com" > site/CNAME
          # (site/index.html is already in your repo)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
